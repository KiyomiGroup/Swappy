<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Swap Options — Swappy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080C10;--surface:#0F1520;--surface2:#151D2B;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--accent:#00E5A0;--accent2:#FF6B35;--text:#F0F4FF;--muted:#6B7FA3;--danger:#FF4D6D;--gold:#FFD166;--font:'Syne',sans-serif;--mono:'DM Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(8,12,16,.94);backdrop-filter:blur(24px)}
.nav-logo{font-size:26px;font-weight:800;letter-spacing:-.5px}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:32px}
.nav-links a{font-size:14px;color:var(--muted);transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-cta{background:var(--accent);color:#000;font-weight:700;font-size:13px;padding:10px 22px;border:none;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-block}
.main{max-width:1160px;margin:0 auto;padding:60px 48px 80px;flex:1;width:100%}
.results-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:44px;gap:24px;flex-wrap:wrap}
.results-top h1{font-size:38px;font-weight:800;letter-spacing:-1.5px;margin-bottom:8px}
.results-top p{color:var(--muted);font-size:15px}
.yd-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 26px;min-width:250px}
.yd-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.yd-model{font-size:16px;font-weight:700;margin-bottom:4px}
.yd-detail{font-size:13px;color:var(--muted)}
.yd-value{font-size:28px;font-weight:800;color:var(--accent);margin-top:14px;letter-spacing:-1px}
.sort-bar{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.sort-btn{font-family:var(--mono);font-size:11px;padding:8px 16px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);letter-spacing:1px;transition:all .2s;text-transform:uppercase}
.sort-btn.active{background:var(--surface2);color:var(--text)}
.sort-btn:hover{color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s}
.card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.card.best{border-color:var(--accent)}
.card-img{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-device{font-size:80px;transition:transform .3s;filter:drop-shadow(0 16px 32px rgba(0,0,0,.5))}
.card:hover .card-device{transform:scale(1.06) translateY(-4px)}
.best-badge{position:absolute;top:12px;left:12px;background:var(--accent);color:#000;font-family:var(--mono);font-size:9px;font-weight:600;padding:4px 10px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.stock-pill{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);border:1px solid var(--border2);font-family:var(--mono);font-size:9px;color:var(--muted);padding:4px 8px;border-radius:4px}
.card-body{padding:20px}
.card-agency{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.agency-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agency-nm{font-size:13px;font-weight:600;flex:1}
.badge{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;font-weight:500;border:1px solid;display:inline-block}
.card-model{font-size:17px;font-weight:700;margin-bottom:6px}
.card-specs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.spec-tag{background:var(--surface2);font-size:12px;padding:3px 10px;border-radius:4px}
.card-rating{font-family:var(--mono);font-size:12px;margin-bottom:2px}
.stars{color:var(--gold);font-size:12px}
.stars-count{color:var(--muted);font-family:var(--mono);font-size:11px;margin-left:5px}
.card-diff{display:flex;align-items:flex-end;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.diff-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.diff-val{font-size:22px;font-weight:800;letter-spacing:-.5px}
.diff-val.add{color:var(--accent2)}
.diff-val.even{color:var(--accent)}
.diff-val.save{color:var(--accent)}
.diff-note{font-size:11px;color:var(--muted);font-family:var(--mono)}
.btn-back{background:transparent;color:var(--muted);font-size:14px;padding:13px 26px;border:1px solid var(--border2);border-radius:8px;transition:all .2s;margin-top:36px;display:inline-block}
.btn-back:hover{color:var(--text);border-color:var(--text)}
.footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-copy{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px}
.footer-links{display:flex;gap:24px}
.footer-links a{font-family:var(--mono);font-size:11px;color:var(--muted)}
.footer-links a:hover{color:var(--text)}
@media(max-width:768px){.nav{padding:16px 20px}.nav-links{display:none}.main{padding:40px 20px 60px}.grid{grid-template-columns:1fr}.footer{padding:20px}}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">swap<span>py</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="swap.html" class="active">Swap</a>
    <a href="agencies.html">Agencies</a>
  </div>
  <a href="swap.html" class="nav-cta">New Swap</a>
</nav>
<div class="main">
  <div class="results-top">
    <div><h1>Swap Options</h1><p id="rCount">Loading…</p></div>
    <div class="yd-box">
      <div class="yd-lbl">Your Device</div>
      <div class="yd-model" id="rModel">—</div>
      <div class="yd-detail" id="rDetail">—</div>
      <div id="rIssues" style="font-size:12px;color:#FF4D6D;margin-top:4px;display:none"></div>
      <div class="yd-value" id="rValue">—</div>
    </div>
  </div>
  <div class="sort-bar">
    <button class="sort-btn active" onclick="setSort('best',this)">Best Match</button>
    <button class="sort-btn" onclick="setSort('low',this)">Lowest Top-Up</button>
    <button class="sort-btn" onclick="setSort('high',this)">Highest Value</button>
    <button class="sort-btn" onclick="setSort('rating',this)">Top Rated</button>
  </div>
  <div class="grid" id="rGrid"></div>
  <div style="margin-top:36px;padding-top:28px;border-top:1px solid rgba(255,255,255,.07)">
    <button class="btn-back" onclick="window.location.href='swap.html'">← Edit Device</button>
  </div>
</div>
<footer class="footer">
  <div class="footer-copy">SWAPPY © 2026 — MVP BETA</div>
  <div class="footer-links"><a href="index.html">Home</a><a href="agencies.html">Agencies</a></div>
</footer>
<script>
const AGENCIES=[{id:"a1",name:"SwapZone Nigeria",location:"Lagos, NG",rating:4.8,reviews:312,badge:"Top Dealer",color:"#00E5A0"},{id:"a2",name:"GadgetHub Africa",location:"Abuja, NG",rating:4.6,reviews:189,badge:"Verified",color:"#FF6B35"},{id:"a3",name:"TechSwap Pro",location:"Lagos, NG",rating:4.9,reviews:521,badge:"Premium",color:"#A78BFA"},{id:"a4",name:"PhoneXchange",location:"Port Harcourt, NG",rating:4.5,reviews:98,badge:"Verified",color:"#38BDF8"}];
const LISTINGS=[{id:"l1",agencyId:"a1",brand:"iPhone",model:"iPhone 16 Pro Max",storage:"256GB",condition:"likenew",stock:3},{id:"l2",agencyId:"a3",brand:"iPhone",model:"iPhone 16 Pro Max",storage:"512GB",condition:"sealed",stock:1},{id:"l3",agencyId:"a2",brand:"iPhone",model:"iPhone 16 Pro",storage:"256GB",condition:"likenew",stock:5},{id:"l4",agencyId:"a4",brand:"iPhone",model:"iPhone 16 Pro",storage:"128GB",condition:"used",stock:2},{id:"l5",agencyId:"a1",brand:"iPhone",model:"iPhone 16",storage:"256GB",condition:"sealed",stock:4},{id:"l6",agencyId:"a3",brand:"iPhone",model:"iPhone 16",storage:"128GB",condition:"likenew",stock:6},{id:"l7",agencyId:"a1",brand:"iPhone",model:"iPhone 15 Pro Max",storage:"256GB",condition:"likenew",stock:2},{id:"l8",agencyId:"a2",brand:"iPhone",model:"iPhone 15 Pro",storage:"128GB",condition:"used",stock:3},{id:"l9",agencyId:"a3",brand:"Samsung",model:"Galaxy S25 Ultra",storage:"256GB",condition:"sealed",stock:2},{id:"l10",agencyId:"a1",brand:"Samsung",model:"Galaxy S25 Ultra",storage:"512GB",condition:"likenew",stock:1},{id:"l11",agencyId:"a4",brand:"Samsung",model:"Galaxy S25+",storage:"256GB",condition:"likenew",stock:4},{id:"l12",agencyId:"a2",brand:"Samsung",model:"Galaxy S25",storage:"128GB",condition:"used",stock:3},{id:"l13",agencyId:"a3",brand:"Samsung",model:"Galaxy S24 Ultra",storage:"256GB",condition:"likenew",stock:2},{id:"l14",agencyId:"a1",brand:"iPhone",model:"iPhone 14 Pro Max",storage:"256GB",condition:"likenew",stock:5},{id:"l15",agencyId:"a2",brand:"iPhone",model:"iPhone 14 Pro",storage:"128GB",condition:"used",stock:4},{id:"l16",agencyId:"a4",brand:"Samsung",model:"Galaxy Z Fold 6",storage:"256GB",condition:"likenew",stock:1}];
const CONDITIONS=[{id:"sealed",label:"New — Sealed Box",multiplier:1.0},{id:"likenew",label:"Like New",multiplier:0.88},{id:"used",label:"Used — Good",multiplier:0.72}];
const BP={"iPhone 16 Pro Max":{"128GB":1199,"256GB":1329,"512GB":1549,"1TB":1749},"iPhone 16 Pro":{"128GB":999,"256GB":1129,"512GB":1349,"1TB":1549},"iPhone 16 Plus":{"128GB":899,"256GB":1029,"512GB":1249},"iPhone 16":{"128GB":799,"256GB":929,"512GB":1149},"iPhone 15 Pro Max":{"256GB":1099,"512GB":1319,"1TB":1519},"iPhone 15 Pro":{"128GB":899,"256GB":1029,"512GB":1249,"1TB":1449},"iPhone 15 Plus":{"128GB":799,"256GB":929},"iPhone 15":{"128GB":699,"256GB":829,"512GB":1049},"iPhone 14 Pro Max":{"128GB":799,"256GB":899,"512GB":1099,"1TB":1299},"iPhone 14 Pro":{"128GB":699,"256GB":799,"512GB":999,"1TB":1199},"iPhone 14 Plus":{"128GB":599,"256GB":699,"512GB":899},"iPhone 14":{"128GB":499,"256GB":599,"512GB":799},"iPhone 13 Pro Max":{"128GB":599,"256GB":699,"512GB":799},"iPhone 13 Pro":{"128GB":499,"256GB":599,"512GB":699},"iPhone 13":{"128GB":399,"256GB":469,"512GB":599},"iPhone 13 Mini":{"128GB":329,"256GB":399,"512GB":499},"iPhone 12 Pro Max":{"128GB":379,"256GB":429,"512GB":549},"iPhone 12 Pro":{"128GB":299,"256GB":349,"512GB":449},"iPhone 12":{"64GB":199,"128GB":249,"256GB":299},"iPhone 12 Mini":{"64GB":169,"128GB":209,"256GB":259},"Galaxy S25 Ultra":{"256GB":1299,"512GB":1519,"1TB":1749},"Galaxy S25+":{"256GB":999,"512GB":1219},"Galaxy S25":{"128GB":799,"256GB":929},"Galaxy S24 Ultra":{"256GB":999,"512GB":1219,"1TB":1449},"Galaxy S24+":{"256GB":799,"512GB":1019},"Galaxy S24":{"128GB":649,"256GB":779},"Galaxy S23 Ultra":{"256GB":749,"512GB":969},"Galaxy S23+":{"256GB":599,"512GB":819},"Galaxy S23":{"128GB":449,"256GB":579},"Galaxy Z Fold 6":{"256GB":1799,"512GB":2019},"Galaxy Z Fold 5":{"256GB":1299,"512GB":1519},"Galaxy Z Flip 6":{"256GB":999,"512GB":1219},"Galaxy Z Flip 5":{"256GB":699,"512GB":919},"Galaxy A55":{"128GB":349,"256GB":429},"Galaxy A35":{"128GB":249,"256GB":329},"Galaxy A15":{"128GB":149,"256GB":199}};
function getBP(m,s){return(BP[m]&&BP[m][s])?BP[m][s]:0}
function getCond(id){return CONDITIONS.find(c=>c.id===id)||null}
function condLabel(id){const c=getCond(id);return c?c.label:id}
function listPrice(l){return Math.round(getBP(l.model,l.storage)*((getCond(l.condition)||{multiplier:1}).multiplier))}
function fmt(n){return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n)}
function stars(r){return"★".repeat(Math.round(r))+"☆".repeat(5-Math.round(r))}
function diffD(d){if(Math.abs(d)<20)return{label:"Even Swap",cls:"even",note:"No top-up needed"};if(d>0)return{label:`+ ${fmt(d)}`,cls:"add",note:"You add this amount"};return{label:`Save ${fmt(Math.abs(d))}`,cls:"save",note:"You receive credit"}}

const raw=sessionStorage.getItem("swappy_device");
if(!raw){window.location.href="swap.html";}
const dev=JSON.parse(raw);
document.getElementById("rModel").textContent=dev.model;
document.getElementById("rDetail").textContent=dev.storage+" · "+condLabel(dev.condition);
document.getElementById("rValue").textContent=fmt(dev.value||0);
if(dev.issues&&dev.issues.length&&dev.issues[0]!=="none"){const el=document.getElementById("rIssues");el.style.display="block";el.textContent=dev.issues.length+" issue"+(dev.issues.length>1?"s":"")+" noted"}

let sortMode="best";
function setSort(m,btn){sortMode=m;document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render()}
function getResults(){
  return LISTINGS.map(l=>{const p=listPrice(l);const ag=AGENCIES.find(a=>a.id===l.agencyId);return{...l,price:p,diff:p-(dev.value||0),agency:ag}});
}
function getSorted(){
  const r=getResults();
  if(sortMode==="best")return r.sort((a,b)=>Math.abs(a.diff)-Math.abs(b.diff));
  if(sortMode==="low")return r.sort((a,b)=>a.diff-b.diff);
  if(sortMode==="high")return r.sort((a,b)=>b.diff-a.diff);
  if(sortMode==="rating")return r.sort((a,b)=>b.agency.rating-a.agency.rating);
  return r;
}
function render(){
  const sorted=getSorted();
  document.getElementById("rCount").textContent=sorted.length+" listings from verified agencies";
  document.getElementById("rGrid").innerHTML=sorted.map((l,i)=>{
    const d=diffD(l.diff),isBest=i===0,isF=l.brand==="Samsung"&&l.model.includes("Fold");
    return`<div class="card${isBest?" best":""}" onclick="pick('${l.id}')">
      <div class="card-img" style="background:linear-gradient(135deg,#151D2B,${l.agency.color}18)">
        ${isBest?'<div class="best-badge">Best Match</div>':""}
        <div class="stock-pill">${l.stock} in stock</div>
        <div class="card-device">${isF?"📲":"📱"}</div>
      </div>
      <div class="card-body">
        <div class="card-agency"><div class="agency-dot" style="background:${l.agency.color}"></div><div class="agency-nm">${l.agency.name}</div><span class="badge" style="color:${l.agency.color};border-color:${l.agency.color}55;background:${l.agency.color}18">${l.agency.badge}</span></div>
        <div class="card-model">${l.model}</div>
        <div class="card-specs"><span class="spec-tag">${l.storage}</span><span class="spec-tag">${condLabel(l.condition)}</span></div>
        <div class="card-rating"><span class="stars">${stars(l.agency.rating)}</span><span class="stars-count">${l.agency.rating} (${l.agency.reviews})</span></div>
        <div class="card-diff">
          <div><div class="diff-lbl">You pay / save</div><div class="diff-val ${d.cls}">${d.label}</div><div class="diff-note">${d.note}</div></div>
          <div style="text-align:right"><div style="font-family:var(--mono);font-size:10px;color:var(--muted)">Market price</div><div style="font-size:14px;font-weight:700;margin-top:2px">${fmt(l.price)}</div></div>
        </div>
      </div>
    </div>`;
  }).join("");
}
function pick(id){sessionStorage.setItem("swappy_listing",id);window.location.href="summary.html"}
render();
</script>
</body>
</html>
