<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agency Profile — Swappy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080C10;--surface:#0F1520;--surface2:#151D2B;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--accent:#00E5A0;--accent2:#FF6B35;--text:#F0F4FF;--muted:#6B7FA3;--danger:#FF4D6D;--gold:#FFD166;--font:'Syne',sans-serif;--mono:'DM Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(8,12,16,.94);backdrop-filter:blur(24px)}
.nav-logo{font-size:26px;font-weight:800;letter-spacing:-.5px}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:32px}
.nav-links a{font-size:14px;color:var(--muted);transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-cta{background:var(--accent);color:#000;font-weight:700;font-size:13px;padding:10px 22px;border:none;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-block}
.main{max-width:1060px;margin:0 auto;padding:60px 48px 80px;flex:1;width:100%}
.btn-back{background:transparent;color:var(--muted);font-size:13px;padding:10px 22px;border:1px solid var(--border2);border-radius:7px;transition:all .2s;margin-bottom:36px;display:inline-block}
.btn-back:hover{color:var(--text);border-color:var(--text)}
.ap-hero{display:flex;align-items:flex-start;gap:28px;margin-bottom:44px;flex-wrap:wrap}
.ap-avatar{width:84px;height:84px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;flex-shrink:0}
.ap-info h1{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.ap-meta{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-top:10px}
.ap-meta-item{font-size:12px;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:6px}
.badge{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;font-weight:500;border:1px solid;display:inline-block;margin-bottom:10px}
.stars{color:#FFD166;font-size:12px}
.ap-stats{display:flex;gap:2px;margin-bottom:44px;flex-wrap:wrap}
.ap-stat{background:var(--surface);padding:24px 28px;flex:1;min-width:120px}
.ap-stat-n{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:3px}
.ap-stat-l{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.section-title{font-size:12px;font-family:var(--mono);color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;display:flex;align-items:center;gap:16px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.l-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s}
.l-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.l-img{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:72px;filter:drop-shadow(0 10px 20px rgba(0,0,0,.5))}
.l-body{padding:18px}
.l-model{font-size:15px;font-weight:700;margin-bottom:6px}
.l-specs{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.l-spec{background:var(--surface2);font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:3px;color:var(--muted)}
.l-price{font-size:18px;font-weight:800;margin-bottom:4px}
.l-stock{font-size:11px;font-family:var(--mono);color:var(--muted)}
.footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-copy{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px}
.footer-links{display:flex;gap:24px}
.footer-links a{font-family:var(--mono);font-size:11px;color:var(--muted)}
.footer-links a:hover{color:var(--text)}
@media(max-width:768px){.nav{padding:16px 20px}.nav-links{display:none}.main{padding:40px 20px 60px}.listings-grid{grid-template-columns:1fr}.ap-stats{flex-direction:column;gap:2px}.footer{padding:20px}}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">swap<span>py</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="swap.html">Swap</a>
    <a href="agencies.html" class="active">Agencies</a>
  </div>
  <a href="swap.html" class="nav-cta">Start Swap</a>
</nav>
<div class="main">
  <a href="agencies.html" class="btn-back">← Back to Agencies</a>
  <div class="ap-hero" id="apHero"></div>
  <div class="ap-stats" id="apStats"></div>
  <div class="section-title">Current Listings</div>
  <div class="listings-grid" id="lGrid"></div>
</div>
<footer class="footer">
  <div class="footer-copy">SWAPPY © 2026 — MVP BETA</div>
  <div class="footer-links"><a href="index.html">Home</a><a href="swap.html">Start Swap</a></div>
</footer>
<script>
const AGENCIES=[{id:"a1",name:"SwapZone Nigeria",location:"Lagos, NG",rating:4.8,reviews:312,badge:"Top Dealer",color:"#00E5A0"},{id:"a2",name:"GadgetHub Africa",location:"Abuja, NG",rating:4.6,reviews:189,badge:"Verified",color:"#FF6B35"},{id:"a3",name:"TechSwap Pro",location:"Lagos, NG",rating:4.9,reviews:521,badge:"Premium",color:"#A78BFA"},{id:"a4",name:"PhoneXchange",location:"Port Harcourt, NG",rating:4.5,reviews:98,badge:"Verified",color:"#38BDF8"}];
const LISTINGS=[{id:"l1",agencyId:"a1",brand:"iPhone",model:"iPhone 16 Pro Max",storage:"256GB",condition:"likenew",stock:3},{id:"l2",agencyId:"a3",brand:"iPhone",model:"iPhone 16 Pro Max",storage:"512GB",condition:"sealed",stock:1},{id:"l3",agencyId:"a2",brand:"iPhone",model:"iPhone 16 Pro",storage:"256GB",condition:"likenew",stock:5},{id:"l4",agencyId:"a4",brand:"iPhone",model:"iPhone 16 Pro",storage:"128GB",condition:"used",stock:2},{id:"l5",agencyId:"a1",brand:"iPhone",model:"iPhone 16",storage:"256GB",condition:"sealed",stock:4},{id:"l6",agencyId:"a3",brand:"iPhone",model:"iPhone 16",storage:"128GB",condition:"likenew",stock:6},{id:"l7",agencyId:"a1",brand:"iPhone",model:"iPhone 15 Pro Max",storage:"256GB",condition:"likenew",stock:2},{id:"l8",agencyId:"a2",brand:"iPhone",model:"iPhone 15 Pro",storage:"128GB",condition:"used",stock:3},{id:"l9",agencyId:"a3",brand:"Samsung",model:"Galaxy S25 Ultra",storage:"256GB",condition:"sealed",stock:2},{id:"l10",agencyId:"a1",brand:"Samsung",model:"Galaxy S25 Ultra",storage:"512GB",condition:"likenew",stock:1},{id:"l11",agencyId:"a4",brand:"Samsung",model:"Galaxy S25+",storage:"256GB",condition:"likenew",stock:4},{id:"l12",agencyId:"a2",brand:"Samsung",model:"Galaxy S25",storage:"128GB",condition:"used",stock:3},{id:"l13",agencyId:"a3",brand:"Samsung",model:"Galaxy S24 Ultra",storage:"256GB",condition:"likenew",stock:2},{id:"l14",agencyId:"a1",brand:"iPhone",model:"iPhone 14 Pro Max",storage:"256GB",condition:"likenew",stock:5},{id:"l15",agencyId:"a2",brand:"iPhone",model:"iPhone 14 Pro",storage:"128GB",condition:"used",stock:4},{id:"l16",agencyId:"a4",brand:"Samsung",model:"Galaxy Z Fold 6",storage:"256GB",condition:"likenew",stock:1}];
const CONDITIONS=[{id:"sealed",label:"New — Sealed Box",multiplier:1.0},{id:"likenew",label:"Like New",multiplier:0.88},{id:"used",label:"Used — Good",multiplier:0.72}];
const BP={"iPhone 16 Pro Max":{"128GB":1199,"256GB":1329,"512GB":1549,"1TB":1749},"iPhone 16 Pro":{"128GB":999,"256GB":1129,"512GB":1349,"1TB":1549},"iPhone 16 Plus":{"128GB":899,"256GB":1029,"512GB":1249},"iPhone 16":{"128GB":799,"256GB":929,"512GB":1149},"iPhone 15 Pro Max":{"256GB":1099,"512GB":1319,"1TB":1519},"iPhone 15 Pro":{"128GB":899,"256GB":1029,"512GB":1249,"1TB":1449},"iPhone 15 Plus":{"128GB":799,"256GB":929},"iPhone 15":{"128GB":699,"256GB":829,"512GB":1049},"iPhone 14 Pro Max":{"128GB":799,"256GB":899,"512GB":1099,"1TB":1299},"iPhone 14 Pro":{"128GB":699,"256GB":799,"512GB":999,"1TB":1199},"iPhone 14 Plus":{"128GB":599,"256GB":699,"512GB":899},"iPhone 14":{"128GB":499,"256GB":599,"512GB":799},"iPhone 13 Pro Max":{"128GB":599,"256GB":699,"512GB":799},"iPhone 13 Pro":{"128GB":499,"256GB":599,"512GB":699},"iPhone 13":{"128GB":399,"256GB":469,"512GB":599},"iPhone 13 Mini":{"128GB":329,"256GB":399,"512GB":499},"iPhone 12 Pro Max":{"128GB":379,"256GB":429,"512GB":549},"iPhone 12 Pro":{"128GB":299,"256GB":349,"512GB":449},"iPhone 12":{"64GB":199,"128GB":249,"256GB":299},"iPhone 12 Mini":{"64GB":169,"128GB":209,"256GB":259},"Galaxy S25 Ultra":{"256GB":1299,"512GB":1519,"1TB":1749},"Galaxy S25+":{"256GB":999,"512GB":1219},"Galaxy S25":{"128GB":799,"256GB":929},"Galaxy S24 Ultra":{"256GB":999,"512GB":1219,"1TB":1449},"Galaxy S24+":{"256GB":799,"512GB":1019},"Galaxy S24":{"128GB":649,"256GB":779},"Galaxy S23 Ultra":{"256GB":749,"512GB":969},"Galaxy S23+":{"256GB":599,"512GB":819},"Galaxy S23":{"128GB":449,"256GB":579},"Galaxy Z Fold 6":{"256GB":1799,"512GB":2019},"Galaxy Z Fold 5":{"256GB":1299,"512GB":1519},"Galaxy Z Flip 6":{"256GB":999,"512GB":1219},"Galaxy Z Flip 5":{"256GB":699,"512GB":919},"Galaxy A55":{"128GB":349,"256GB":429},"Galaxy A35":{"128GB":249,"256GB":329},"Galaxy A15":{"128GB":149,"256GB":199}};

function getBP(m,s){return(BP[m]&&BP[m][s])?BP[m][s]:0}
function getCond(id){return CONDITIONS.find(c=>c.id===id)||null}
function condLabel(id){const c=getCond(id);return c?c.label:id}
function listPrice(l){return Math.round(getBP(l.model,l.storage)*((getCond(l.condition)||{multiplier:1}).multiplier))}
function fmt(n){return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n)}
function stars(r){return"★".repeat(Math.round(r))+"☆".repeat(5-Math.round(r))}

const agId=new URLSearchParams(window.location.search).get("id");
const agency=AGENCIES.find(a=>a.id===agId);
if(!agency){window.location.href="agencies.html";}
document.title=agency.name+" — Swappy";
const ls=LISTINGS.filter(l=>l.agencyId===agId).map(l=>({...l,price:listPrice(l)}));
const totalStock=ls.reduce((s,l)=>s+l.stock,0);
const brands=[...new Set(ls.map(l=>l.brand))];

document.getElementById("apHero").innerHTML=`
  <div class="ap-avatar" style="background:${agency.color}22;color:${agency.color}">${agency.name.charAt(0)}</div>
  <div class="ap-info">
    <span class="badge" style="color:${agency.color};border-color:${agency.color}55;background:${agency.color}18">${agency.badge}</span>
    <h1>${agency.name}</h1>
    <div class="ap-meta">
      <div class="ap-meta-item">📍 ${agency.location}</div>
      <div class="ap-meta-item"><span class="stars">${stars(agency.rating)}</span>&nbsp;${agency.rating} · ${agency.reviews} reviews</div>
      <div class="ap-meta-item">⏱ 24h response time</div>
    </div>
  </div>`;

document.getElementById("apStats").innerHTML=`
  <div class="ap-stat"><div class="ap-stat-n" style="color:${agency.color}">${agency.rating}★</div><div class="ap-stat-l">Rating</div></div>
  <div class="ap-stat"><div class="ap-stat-n">${agency.reviews}</div><div class="ap-stat-l">Reviews</div></div>
  <div class="ap-stat"><div class="ap-stat-n">${ls.length}</div><div class="ap-stat-l">Listings</div></div>
  <div class="ap-stat"><div class="ap-stat-n">${totalStock}</div><div class="ap-stat-l">In Stock</div></div>
  <div class="ap-stat"><div class="ap-stat-n">${brands.join(" / ")}</div><div class="ap-stat-l">Brands</div></div>`;

const g=document.getElementById("lGrid");
if(!ls.length){g.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)">No listings at the moment.</div>`}
else{
  ls.forEach(l=>{
    const isF=l.brand==="Samsung"&&l.model.includes("Fold");
    g.innerHTML+=`<div class="l-card">
      <div class="l-img" style="background:linear-gradient(135deg,#151D2B,${agency.color}14)">${isF?"📲":"📱"}</div>
      <div class="l-body">
        <div class="l-model">${l.model}</div>
        <div class="l-specs"><span class="l-spec">${l.storage}</span><span class="l-spec">${condLabel(l.condition)}</span></div>
        <div class="l-price" style="color:${agency.color}">${fmt(l.price)}</div>
        <div class="l-stock">${l.stock} unit${l.stock!==1?"s":""} available</div>
      </div>
    </div>`;
  });
}
</script>
</body>
</html>
